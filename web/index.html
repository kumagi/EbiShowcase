<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="robots" content="noindex">
  <title>Ebi Showcase</title>
  <link rel="alternate" hreflang="ja" href="./ja/">
  <link rel="alternate" hreflang="en" href="./en/">
  <link rel="alternate" hreflang="x-default" href="./">
  <style>html,body{height:100%;margin:0;background:#071426;color:#21d8ba;font:700 12px monospace}body{display:grid;place-items:center}.language-gate{text-align:center;letter-spacing:.12em}.links{margin-top:24px;display:flex;gap:14px;justify-content:center}.links a{border:1px solid #21d8ba;color:#fff;padding:12px 18px;text-decoration:none}</style>
  <script>
    (() => {
      const saved = localStorage.getItem("ebi-language");
      const preferred = saved || (navigator.languages || [navigator.language || "en"]).find(Boolean);
      const language = String(preferred).toLowerCase().startsWith("ja") ? "ja" : "en";
      location.replace("./" + language + "/" + location.hash);
    })();
  </script>
</head>
<body>
  <main class="language-gate">
    <p>SELECT LANGUAGE</p>
    <div class="links"><a href="./ja/" lang="ja">日本語</a><a href="./en/" lang="en">English</a></div>
  </main>
</body>
</html>
