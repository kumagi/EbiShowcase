  <style>html,body{height:100%;margin:0;background:radial-gradient(700px 420px at 85% -10%,rgba(141,123,255,.3),transparent 60%),radial-gradient(560px 360px at -5% 110%,rgba(46,230,200,.22),transparent 60%),#131a3f;color:#2ee6c8;font:700 12px ui-monospace,SFMono-Regular,Menlo,monospace}body{display:grid;place-items:center}.language-gate{text-align:center;letter-spacing:.12em}.links{margin-top:24px;display:flex;gap:14px;justify-content:center}.links a{border:2px solid #2ee6c8;color:#fff;padding:12px 22px;text-decoration:none;border-radius:999px;transition:background .18s,color .18s}.links a:hover{background:linear-gradient(120deg,#8d7bff,#2ee6c8);border-color:transparent;color:#0c1235}</style>
  <script>
    (() => {
      const saved = localStorage.getItem("ebi-language");
      const preferred = saved || (navigator.languages || [navigator.language || "en"]).find(Boolean);
      const language = String(preferred).toLowerCase().startsWith("ja") ? "ja" : "en";
      location.replace("./" + language + "/" + location.hash);
    })();
  </script>

<body>
  <main class="language-gate">
    <p>SELECT LANGUAGE</p>
    <div class="links"><a href="./ja/" lang="ja">日本語</a><a href="./en/" lang="en">English</a></div>
  </main>
