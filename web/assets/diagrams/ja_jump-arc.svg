<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 300" role="img" aria-labelledby="title desc" focusable="false"><title id="title">ジャンプの軌道</title><desc id="desc">初速度と重力で放物線を作る</desc><defs><marker id="arrow" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 z" fill="#6a58e6"/></marker><linearGradient id="card" x1="0" x2="1" y1="0" y2="1"><stop stop-color="#ffffff"/><stop offset="1" stop-color="#eef1ff"/></linearGradient></defs><rect width="920" height="300" rx="28" fill="#f4f6ff"/><path d="M90 235 C240 235 220 55 460 55 S690 235 830 235" fill="none" stroke="#6a58e6" stroke-width="8"/><path d="M90 235 L830 235" stroke="#9aa6ce" stroke-width="3" stroke-dasharray="8 8"/><text x="115" y="210" text-anchor="start" font-family="system-ui,-apple-system,'Hiragino Sans',sans-serif" font-size="17" font-weight="800" fill="#2b3158"><tspan x="115" dy="0">初速度</tspan></text><text x="440" y="78" text-anchor="middle" font-family="system-ui,-apple-system,'Hiragino Sans',sans-serif" font-size="17" font-weight="800" fill="#2b3158"><tspan x="440" dy="0">重力</tspan></text><text x="700" y="210" text-anchor="middle" font-family="system-ui,-apple-system,'Hiragino Sans',sans-serif" font-size="19" font-weight="800" fill="#6a58e6"><tspan x="700" dy="0">なめらかな放物線</tspan></text><text x="55" y="40" font-family="monospace" font-size="15" fill="#6a58e6">y += vy   /   vy += gravity</text></svg>
