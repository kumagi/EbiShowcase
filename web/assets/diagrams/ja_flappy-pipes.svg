<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1155 415" role="img" aria-labelledby="title desc" focusable="false"><title id="title">パイプを一定間隔で出す</title><desc id="desc">タイマー、すき間、スクロール、得点を一つの流れで見る</desc><defs><marker id="arrow" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 z" fill="#6a58e6"/></marker><linearGradient id="card" x1="0" x2="1" y1="0" y2="1"><stop stop-color="#ffffff"/><stop offset="1" stop-color="#eef1ff"/></linearGradient></defs><rect width="1155" height="415" rx="28" fill="#f4f6ff"/><path d="M218 127 C254.3 127,302.7 127,339 127" fill="none" stroke="#6a58e6" stroke-width="4" marker-end="url(#arrow)"/><path d="M517 127 C553.3 127,601.7 127,638 127" fill="none" stroke="#6a58e6" stroke-width="4" marker-end="url(#arrow)"/><path d="M816 127 C852.3 127,900.7 127,937 127" fill="none" stroke="#6a58e6" stroke-width="4" marker-end="url(#arrow)"/><path d="M1115 127 C1437.5 127,-282.5 277,40 277" fill="none" stroke="#6a58e6" stroke-width="4" marker-end="url(#arrow)"/><path d="M218 277 C271.4 277,-13.399999999999999 127,40 127" fill="none" stroke="#6a58e6" stroke-width="4" marker-end="url(#arrow)"/><g><rect x="40" y="82" width="178" height="90" rx="18" fill="url(#card)" stroke="#dffaf4" stroke-width="8"/><circle cx="63" cy="105" r="8" fill="#2ee6c8"/><text x="129" y="124" text-anchor="middle" font-family="system-ui,-apple-system,'Hiragino Sans',sans-serif" font-size="17" font-weight="800" fill="#2b3158"><tspan x="129" dy="0">spawnTimer</tspan><tspan x="129" dy="23">1 tickごとに減る</tspan></text></g><g><rect x="339" y="82" width="178" height="90" rx="18" fill="url(#card)" stroke="#e8e2ff" stroke-width="8"/><circle cx="362" cy="105" r="8" fill="#2ee6c8"/><text x="428" y="124" text-anchor="middle" font-family="system-ui,-apple-system,'Hiragino Sans',sans-serif" font-size="17" font-weight="800" fill="#2b3158"><tspan x="428" dy="0">すき間を決める</tspan><tspan x="428" dy="23">乱数 + clamp</tspan></text></g><g><rect x="638" y="82" width="178" height="90" rx="18" fill="url(#card)" stroke="#ffe4ef" stroke-width="8"/><circle cx="661" cy="105" r="8" fill="#2ee6c8"/><text x="727" y="124" text-anchor="middle" font-family="system-ui,-apple-system,'Hiragino Sans',sans-serif" font-size="17" font-weight="800" fill="#2b3158"><tspan x="727" dy="0">上下のパイプ</tspan><tspan x="727" dy="23">同時に追加</tspan></text></g><g><rect x="937" y="82" width="178" height="90" rx="18" fill="url(#card)" stroke="#dffaf4" stroke-width="8"/><circle cx="960" cy="105" r="8" fill="#2ee6c8"/><text x="1026" y="124" text-anchor="middle" font-family="system-ui,-apple-system,'Hiragino Sans',sans-serif" font-size="17" font-weight="800" fill="#2b3158"><tspan x="1026" dy="0">左へ流す</tspan><tspan x="1026" dy="23">x -= speed</tspan></text></g><g><rect x="40" y="232" width="178" height="90" rx="18" fill="url(#card)" stroke="#e8e2ff" stroke-width="8"/><circle cx="63" cy="255" r="8" fill="#2ee6c8"/><text x="129" y="274" text-anchor="middle" font-family="system-ui,-apple-system,'Hiragino Sans',sans-serif" font-size="17" font-weight="800" fill="#2b3158"><tspan x="129" dy="0">通過したら</tspan><tspan x="129" dy="23">score++</tspan></text></g></svg>
