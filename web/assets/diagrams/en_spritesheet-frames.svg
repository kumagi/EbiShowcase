<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 300" role="img" aria-labelledby="title desc" focusable="false"><title id="title">Sprite-sheet frames</title><desc id="desc">Choose a frame number from one strip</desc><defs><marker id="arrow" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 z" fill="#6a58e6"/></marker><linearGradient id="card" x1="0" x2="1" y1="0" y2="1"><stop stop-color="#ffffff"/><stop offset="1" stop-color="#eef1ff"/></linearGradient></defs><rect width="920" height="300" rx="28" fill="#f4f6ff"/><text x="55" y="42" font-family="monospace" font-size="15" fill="#6a58e6">SubImage(sheet, frame * frameWidth, 0, frameWidth, frameHeight)</text><rect x="55" y="85" width="110" height="110" rx="12" fill="#e8e2ff" stroke="#8d7bff" stroke-width="3"/><circle cx="110" cy="140" r="22" fill="#2ee6c8"/><text x="110" y="228" text-anchor="middle" font-family="monospace" font-size="15" fill="#2b3158">frame 0</text><rect x="180" y="85" width="110" height="110" rx="12" fill="#e8e2ff" stroke="#8d7bff" stroke-width="3"/><circle cx="235" cy="140" r="24" fill="#2ee6c8"/><text x="235" y="228" text-anchor="middle" font-family="monospace" font-size="15" fill="#2b3158">frame 1</text><rect x="305" y="85" width="110" height="110" rx="12" fill="#ffe4ef" stroke="#e56891" stroke-width="6"/><circle cx="360" cy="140" r="26" fill="#2ee6c8"/><text x="360" y="228" text-anchor="middle" font-family="monospace" font-size="15" fill="#2b3158">frame 2</text><rect x="430" y="85" width="110" height="110" rx="12" fill="#e8e2ff" stroke="#8d7bff" stroke-width="3"/><circle cx="485" cy="140" r="28" fill="#2ee6c8"/><text x="485" y="228" text-anchor="middle" font-family="monospace" font-size="15" fill="#2b3158">frame 3</text><rect x="555" y="85" width="110" height="110" rx="12" fill="#e8e2ff" stroke="#8d7bff" stroke-width="3"/><circle cx="610" cy="140" r="30" fill="#2ee6c8"/><text x="610" y="228" text-anchor="middle" font-family="monospace" font-size="15" fill="#2b3158">frame 4</text><rect x="680" y="85" width="110" height="110" rx="12" fill="#e8e2ff" stroke="#8d7bff" stroke-width="3"/><circle cx="735" cy="140" r="32" fill="#2ee6c8"/><text x="735" y="228" text-anchor="middle" font-family="monospace" font-size="15" fill="#2b3158">frame 5</text><path d="M415 140 C610 140 635 140 700 140" fill="none" stroke="#6a58e6" stroke-width="5" marker-end="url(#arrow)"/><text x="805" y="132" text-anchor="middle" font-family="system-ui,-apple-system,'Hiragino Sans',sans-serif" font-size="18" font-weight="800" fill="#6a58e6"><tspan x="805" dy="0">frame++ → choose the picture</tspan></text></svg>
