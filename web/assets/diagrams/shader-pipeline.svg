<svg xmlns="http://www.w3.org/2000/svg" width="960" height="240" viewBox="0 0 960 240" role="img" aria-labelledby="title desc"><title id="title">Safe shader pipeline</title><desc id="desc">Game rules draw a source image. An optional shader samples it with uniforms. If unavailable, normal drawing remains.</desc><rect width="960" height="240" fill="#0c1330"/><g font-family="sans-serif" text-anchor="middle"><g fill="#19345a" stroke="#2ee6c8" stroke-width="3"><rect x="30" y="70" width="190" height="100" rx="16"/><rect x="385" y="70" width="190" height="100" rx="16"/><rect x="740" y="70" width="190" height="100" rx="16"/></g><g fill="#fff" font-size="22"><text x="125" y="112">RULES + DRAW</text><text x="480" y="112">OPTIONAL KAGE</text><text x="835" y="112">SCREEN</text></g><g fill="#bcd0ef" font-size="16"><text x="125" y="142">source image</text><text x="480" y="142">UV / color / pass</text><text x="835" y="142">same playable game</text></g><g stroke="#ffd35b" stroke-width="5"><path d="M225 120h145m-15-14 15 14-15 14M580 120h145m-15-14 15 14-15 14"/></g><text x="480" y="38" fill="#2ee6c8" font-size="18">FALLBACK: DrawImage continues if shader creation fails</text></g></svg>
