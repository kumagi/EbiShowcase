<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 360" role="img" aria-labelledby="title desc" focusable="false"><title id="title">PC, tablet, and phone layout</title><desc id="desc">The same game canvas scales down and keeps controls reachable</desc><defs><marker id="arrow" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 z" fill="#6a58e6"/></marker><linearGradient id="card" x1="0" x2="1" y1="0" y2="1"><stop stop-color="#ffffff"/><stop offset="1" stop-color="#eef1ff"/></linearGradient></defs><rect width="1100" height="360" rx="30" fill="#f4f6ff"/><g><rect x="45" y="155" width="300" height="190" rx="16" fill="#131a3f" stroke="#8d7bff" stroke-width="5"/><rect x="63" y="177" width="264" height="110" rx="10" fill="#2e3a72"/><rect x="73" y="300" width="244" height="13" rx="7" fill="#2ee6c8"/><text x="195" y="377" text-anchor="middle" font-family="system-ui,-apple-system,'Hiragino Sans',sans-serif" font-size="17" font-weight="800" fill="#2b3158"><tspan x="195" dy="0">PC</tspan><tspan x="195" dy="22">copy + game side by side</tspan></text></g><g><rect x="425" y="120" width="250" height="225" rx="16" fill="#131a3f" stroke="#8d7bff" stroke-width="5"/><rect x="443" y="142" width="214" height="145" rx="10" fill="#2e3a72"/><rect x="453" y="300" width="194" height="13" rx="7" fill="#2ee6c8"/><text x="550" y="377" text-anchor="middle" font-family="system-ui,-apple-system,'Hiragino Sans',sans-serif" font-size="17" font-weight="800" fill="#2b3158"><tspan x="550" dy="0">Tablet</tspan><tspan x="550" dy="22">two roomy columns</tspan></text></g><g><rect x="775" y="75" width="180" height="270" rx="24" fill="#131a3f" stroke="#8d7bff" stroke-width="5"/><rect x="793" y="97" width="144" height="190" rx="10" fill="#2e3a72"/><rect x="803" y="300" width="124" height="13" rx="7" fill="#2ee6c8"/><text x="865" y="377" text-anchor="middle" font-family="system-ui,-apple-system,'Hiragino Sans',sans-serif" font-size="17" font-weight="800" fill="#2b3158"><tspan x="865" dy="0">Phone</tspan><tspan x="865" dy="22">one column + large controls</tspan></text></g></svg>
