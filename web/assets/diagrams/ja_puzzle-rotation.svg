<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 300" role="img" aria-labelledby="title desc" focusable="false"><title id="title">パズルの回転中心</title><desc id="desc">タイルの中心を軸に90度回す</desc><defs><marker id="arrow" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 z" fill="#6a58e6"/></marker><linearGradient id="card" x1="0" x2="1" y1="0" y2="1"><stop stop-color="#ffffff"/><stop offset="1" stop-color="#eef1ff"/></linearGradient></defs><rect width="920" height="300" rx="28" fill="#f4f6ff"/><rect x="125" y="95" width="120" height="120" rx="12" fill="#dffaf4" stroke="#0a8f7f" stroke-width="5"/><circle cx="185" cy="155" r="7" fill="#e56891"/><path d="M300 155 H575" stroke="#6a58e6" stroke-width="5" marker-end="url(#arrow)"/><rect x="650" y="95" width="120" height="120" rx="12" fill="#ffe4ef" stroke="#e56891" stroke-width="5" transform="rotate(90 710 155)"/><circle cx="710" cy="155" r="7" fill="#e56891"/><text x="185" y="250" text-anchor="middle" font-family="system-ui,-apple-system,'Hiragino Sans',sans-serif" font-size="18" font-weight="800" fill="#2b3158"><tspan x="185" dy="0">回す前</tspan></text><text x="185" y="155" text-anchor="middle" font-family="system-ui,-apple-system,'Hiragino Sans',sans-serif" font-size="14" font-weight="800" fill="#e56891"><tspan x="185" dy="0">中心</tspan></text><text x="710" y="250" text-anchor="middle" font-family="system-ui,-apple-system,'Hiragino Sans',sans-serif" font-size="18" font-weight="800" fill="#2b3158"><tspan x="710" dy="0">90°回転</tspan></text><text x="55" y="40" font-family="monospace" font-size="15" fill="#6a58e6">Translate(-pivot) → Rotate → Translate(pivot)</text></svg>
