<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 390" role="img" aria-labelledby="title desc" focusable="false"><title id="title">Rectangle overlap</title><desc id="desc">Ask whether the basket and star rectangles overlap</desc><defs><marker id="arrow" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 z" fill="#6a58e6"/></marker><linearGradient id="card" x1="0" x2="1" y1="0" y2="1"><stop stop-color="#ffffff"/><stop offset="1" stop-color="#eef1ff"/></linearGradient></defs><rect width="920" height="390" rx="28" fill="#f4f6ff"/><rect x="80" y="78" width="250" height="130" rx="18" fill="#dffaf4" stroke="#0a8f7f" stroke-width="6"/><rect x="255" y="128" width="250" height="130" rx="18" fill="#ffe4ef" stroke="#e56891" stroke-width="6"/><path d="M510 166 C565 166 585 166 625 166" fill="none" stroke="#6a58e6" stroke-width="5" marker-end="url(#arrow)"/><text x="205" y="145" text-anchor="middle" font-family="system-ui,-apple-system,'Hiragino Sans',sans-serif" font-size="23" font-weight="800" fill="#2b3158"><tspan x="205" dy="0">basket</tspan></text><text x="380" y="199" text-anchor="middle" font-family="system-ui,-apple-system,'Hiragino Sans',sans-serif" font-size="23" font-weight="800" fill="#2b3158"><tspan x="380" dy="0">star</tspan></text><text x="745" y="176" text-anchor="middle" font-family="system-ui,-apple-system,'Hiragino Sans',sans-serif" font-size="22" font-weight="800" fill="#6a58e6"><tspan x="745" dy="0">overlap?</tspan></text><g font-family="monospace" font-size="15" fill="#2b3158"><text x="80" y="305">✓ star left &lt; basket right</text><text x="485" y="305">✓ star right &gt; basket left</text><text x="80" y="345">✓ star top &lt; basket bottom</text><text x="485" y="345">✓ star bottom &gt; basket top</text></g><text x="80" y="375" font-family="monospace" font-size="14" fill="#6a58e6">AABB: all four conditions must be true</text></svg>
