<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1155 415" role="img" aria-labelledby="title desc" focusable="false"><title id="title">Enemy AI state machine</title><desc id="desc">Switch between patrol, chase, attack, and defeat using distance and HP</desc><defs><marker id="arrow" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 z" fill="#6a58e6"/></marker><linearGradient id="card" x1="0" x2="1" y1="0" y2="1"><stop stop-color="#ffffff"/><stop offset="1" stop-color="#eef1ff"/></linearGradient></defs><rect width="1155" height="415" rx="28" fill="#f4f6ff"/><path d="M218 127 C254.3 127,302.7 127,339 127" fill="none" stroke="#6a58e6" stroke-width="4" marker-end="url(#arrow)"/><path d="M517 127 C553.3 127,601.7 127,638 127" fill="none" stroke="#6a58e6" stroke-width="4" marker-end="url(#arrow)"/><path d="M816 127 C852.3 127,900.7 127,937 127" fill="none" stroke="#6a58e6" stroke-width="4" marker-end="url(#arrow)"/><path d="M1115 127 C1347.8 127,106.20000000000002 127,339 127" fill="none" stroke="#6a58e6" stroke-width="4" marker-end="url(#arrow)"/><path d="M1115 127 C1437.5 127,-282.5 277,40 277" fill="none" stroke="#6a58e6" stroke-width="4" marker-end="url(#arrow)"/><g><rect x="40" y="82" width="178" height="90" rx="18" fill="url(#card)" stroke="#dffaf4" stroke-width="8"/><circle cx="63" cy="105" r="8" fill="#2ee6c8"/><text x="129" y="124" text-anchor="middle" font-family="system-ui,-apple-system,'Hiragino Sans',sans-serif" font-size="17" font-weight="800" fill="#2b3158"><tspan x="129" dy="0">PATROL</tspan><tspan x="129" dy="23">walk around</tspan></text></g><g><rect x="339" y="82" width="178" height="90" rx="18" fill="url(#card)" stroke="#e8e2ff" stroke-width="8"/><circle cx="362" cy="105" r="8" fill="#2ee6c8"/><text x="428" y="124" text-anchor="middle" font-family="system-ui,-apple-system,'Hiragino Sans',sans-serif" font-size="17" font-weight="800" fill="#2b3158"><tspan x="428" dy="0">CHASE</tspan><tspan x="428" dy="23">move closer</tspan></text></g><g><rect x="638" y="82" width="178" height="90" rx="18" fill="url(#card)" stroke="#ffe4ef" stroke-width="8"/><circle cx="661" cy="105" r="8" fill="#2ee6c8"/><text x="727" y="124" text-anchor="middle" font-family="system-ui,-apple-system,'Hiragino Sans',sans-serif" font-size="17" font-weight="800" fill="#2b3158"><tspan x="727" dy="0">ATTACK</tspan><tspan x="727" dy="23">strike</tspan></text></g><g><rect x="937" y="82" width="178" height="90" rx="18" fill="url(#card)" stroke="#dffaf4" stroke-width="8"/><circle cx="960" cy="105" r="8" fill="#2ee6c8"/><text x="1026" y="124" text-anchor="middle" font-family="system-ui,-apple-system,'Hiragino Sans',sans-serif" font-size="17" font-weight="800" fill="#2b3158"><tspan x="1026" dy="0">HURT</tspan><tspan x="1026" dy="23">react</tspan></text></g><g><rect x="40" y="232" width="178" height="90" rx="18" fill="url(#card)" stroke="#e8e2ff" stroke-width="8"/><circle cx="63" cy="255" r="8" fill="#2ee6c8"/><text x="129" y="274" text-anchor="middle" font-family="system-ui,-apple-system,'Hiragino Sans',sans-serif" font-size="17" font-weight="800" fill="#2b3158"><tspan x="129" dy="0">DEFEAT</tspan><tspan x="129" dy="23">leave</tspan></text></g></svg>
