<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 940 265" role="img" aria-labelledby="title desc" focusable="false"><title id="title">Play a tile map</title><desc id="desc">Split a text or JSON map into collision rules and pictures</desc><defs><marker id="arrow" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 z" fill="#6a58e6"/></marker><linearGradient id="card" x1="0" x2="1" y1="0" y2="1"><stop stop-color="#ffffff"/><stop offset="1" stop-color="#eef1ff"/></linearGradient></defs><rect width="940" height="265" rx="28" fill="#f4f6ff"/><path d="M218 127 C248 127,237.33333333333337 127,267.33333333333337 127" fill="none" stroke="#6a58e6" stroke-width="4" marker-end="url(#arrow)"/><path d="M445.33333333333337 127 C475.33333333333337 127,464.6666666666667 127,494.6666666666667 127" fill="none" stroke="#6a58e6" stroke-width="4" marker-end="url(#arrow)"/><path d="M445.33333333333337 127 C528.3333333333334 127,639 127,722 127" fill="none" stroke="#6a58e6" stroke-width="4" marker-end="url(#arrow)"/><g><rect x="40" y="82" width="178" height="90" rx="18" fill="url(#card)" stroke="#dffaf4" stroke-width="8"/><circle cx="63" cy="105" r="8" fill="#2ee6c8"/><text x="129" y="124" text-anchor="middle" font-family="system-ui,-apple-system,'Hiragino Sans',sans-serif" font-size="17" font-weight="800" fill="#2b3158"><tspan x="129" dy="0">map.json</tspan><tspan x="129" dy="23">0=floor 1=wall</tspan></text></g><g><rect x="267.33333333333337" y="82" width="178" height="90" rx="18" fill="url(#card)" stroke="#e8e2ff" stroke-width="8"/><circle cx="290.33333333333337" cy="105" r="8" fill="#2ee6c8"/><text x="356.33333333333337" y="124" text-anchor="middle" font-family="system-ui,-apple-system,'Hiragino Sans',sans-serif" font-size="17" font-weight="800" fill="#2b3158"><tspan x="356.33333333333337" dy="0">2D slice</tspan><tspan x="356.33333333333337" dy="23">map[y][x]</tspan></text></g><g><rect x="494.6666666666667" y="82" width="178" height="90" rx="18" fill="url(#card)" stroke="#ffe4ef" stroke-width="8"/><circle cx="517.6666666666667" cy="105" r="8" fill="#2ee6c8"/><text x="583.6666666666667" y="124" text-anchor="middle" font-family="system-ui,-apple-system,'Hiragino Sans',sans-serif" font-size="17" font-weight="800" fill="#2b3158"><tspan x="583.6666666666667" dy="0">can move?</tspan><tspan x="583.6666666666667" dy="23">stop at a wall</tspan></text></g><g><rect x="722" y="82" width="178" height="90" rx="18" fill="url(#card)" stroke="#dffaf4" stroke-width="8"/><circle cx="745" cy="105" r="8" fill="#2ee6c8"/><text x="811" y="124" text-anchor="middle" font-family="system-ui,-apple-system,'Hiragino Sans',sans-serif" font-size="17" font-weight="800" fill="#2b3158"><tspan x="811" dy="0">draw tiles</tspan><tspan x="811" dy="23">at the same cells</tspan></text></g></svg>
