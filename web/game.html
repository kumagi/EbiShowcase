<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
  <title>Ebi Showcase – Game</title>
  <link rel="icon" type="image/png" href="../../assets/favicon.png">
  <link rel="apple-touch-icon" href="../../assets/favicon.png">
  <style>
    html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#0c1330;overscroll-behavior:none;user-select:none;-webkit-user-select:none}
    canvas{display:block;width:100%!important;height:100%!important;object-fit:contain;touch-action:none;outline:none}
    #loading{position:fixed;inset:0;display:grid;place-items:center;color:#2ee6c8;font:700 12px monospace;letter-spacing:.15em}
  </style>
</head>
<body>
  <div id="loading">LOADING WASM…</div>
  <script src="wasm_exec.js"></script>
  <script>
    // iframe 内では最初のクリックが「フォーカス」だけに食われ、ゲーム入力が無視されがち。
    // canvas を探し次第フォーカス可能にして、pointer で確実に受け取る。
    const focusCanvas = () => {
      const c = document.querySelector("canvas");
      if (!c) return null;
      if (!c.hasAttribute("tabindex")) c.tabIndex = 0;
      try { c.focus({ preventScroll: true }); } catch (_) { c.focus(); }
      return c;
    };
    document.addEventListener("pointerdown", focusCanvas, true);
    // Keep gameplay keys inside the embedded game. Tab would otherwise move
    // focus out of the iframe before Ebitengine can use it for ally/target
    // switching, making later controls and retry keys appear unresponsive.
    const gameKeys = new Set([
      "ArrowLeft", "ArrowRight", "ArrowUp", "ArrowDown",
      " ", "Enter", "Tab", "w", "a", "s", "d", "W", "A", "S", "D",
    ]);
    for (const type of ["keydown", "keyup"]) {
      document.addEventListener(type, (event) => {
        if (!gameKeys.has(event.key)) return;
        event.preventDefault();
        focusCanvas();
      }, true);
    }
    const go = new Go();
    WebAssembly.instantiateStreaming(fetch("game.wasm"), go.importObject)
      .then((r) => {
        document.querySelector("#loading").remove();
        go.run(r.instance);
        requestAnimationFrame(focusCanvas);
      })
      .catch((e) => {
        document.querySelector("#loading").textContent = "LOAD FAILED — " + e;
        console.error(e);
      });
  </script>
</body>
</html>
