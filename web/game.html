<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"><title>Ebi Showcase Game</title><style>html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#0c1330;overscroll-behavior:none;user-select:none;-webkit-user-select:none}canvas{display:block;width:100%!important;height:100%!important;object-fit:contain;touch-action:none}#loading{position:fixed;inset:0;display:grid;place-items:center;color:#2ee6c8;font:700 12px monospace;letter-spacing:.15em}</style></head><body><div id="loading">LOADING WASM…</div><script src="wasm_exec.js"></script><script>const go=new Go();WebAssembly.instantiateStreaming(fetch('game.wasm'),go.importObject).then(r=>{document.querySelector('#loading').remove();go.run(r.instance)}).catch(e=>{document.querySelector('#loading').textContent='LOAD FAILED — '+e;console.error(e)});</script></body></html>
